appId: com.ansstudio.ansvideotools
productName: ANS Video Tools
directories:
  output: release
artifactName: ANS-Video-Tools-Setup-${version}-${arch}.${ext}
publish:
  - provider: github
    owner: tankg123
    repo: ANS-video-tools
    releaseType: release
files:
  - out/**
  - resources/**
  - package.json
extraResources:
  - from: bin
    to: bin
    filter: ['**/*.exe']
asar: true
win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  differentialPackage: true
  shortcutName: ANS Video Tools
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
