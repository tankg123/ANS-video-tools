appId: com.ansstudio.ansvideotools
productName: ANS Video Tools
directories:
  output: release
files:
  - out/**
  - package.json
extraResources:
  - from: bin
    to: bin
    filter: ['**/*.exe']
asar: true
win:
  target:
    - nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  shortcutName: ANS Video Tools
